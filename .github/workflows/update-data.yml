name: Update climate data
on:
  schedule:
    - cron: "0 6 5 * *"   # 06:00 UTC on the 5th of each month
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch raw data (fails the job if a required source fails)
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python3 scripts/fetch_data.py
      - name: Process to JSON
        run: python3 scripts/process_data.py
      - name: Commit refreshed JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: monthly refresh"
          file_pattern: "web/public/data/*.json"
      # Deployment: rely on Vercel/Netlify git integration — the commit above
      # triggers the deploy. No explicit deploy step needed.
